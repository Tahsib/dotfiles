name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck aliases

      - name: Check Zsh Syntax
        run: zsh -n .zshrc

      - name: Check Bash Syntax
        run: bash -n .bashrc

      - name: Check StyLua
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check nvim/

  test-install:
    name: Installation & Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.0

      - name: Deploy Dotfiles
        run: make all

      - name: Verify Symlinks
        run: make verify

  nvim-health:
    name: Neovim Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.0

      - name: Headless Startup Check
        run: nvim --headless +qa
